<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CV Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">Interactive CV Generator</h2>

<div class="row">

<!-- FORM -->

<div class="col-md-4">

<h4>Enter Your Information</h4>

<input id="name" class="form-control mb-2" placeholder="Full Name">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="phone" class="form-control mb-2" placeholder="Phone">

<textarea id="summary" class="form-control mb-2" placeholder="Summary"></textarea>

<textarea id="education" class="form-control mb-2" placeholder="Education"></textarea>

<textarea id="skills" class="form-control mb-2" placeholder="Skills"></textarea>

<button class="btn btn-success w-100" onclick="generateCV()">Generate CV</button>

</div>


<!-- CV PREVIEW -->

<div class="col-md-8">

<div id="cvTemplate" class="card p-4">

<h2 id="cvName">Your Name</h2>

<p id="cvEmail">Email</p>

<p id="cvPhone">Phone</p>

<hr>

<h4>Summary</h4>
<p id="cvSummary"></p>

<h4>Education</h4>
<p id="cvEducation"></p>

<h4>Skills</h4>
<p id="cvSkills"></p>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
